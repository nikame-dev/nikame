apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: local
spec:
  replicas: {{ .Values.global.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      serviceAccountName: keycloak
      initContainers:
      - name: wait-for-postgres
        image: busybox:latest
        command:
        - sh
        - -c
        - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:23.0
        args:
        - start
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: keycloak-secret
        - secretRef:
            name: postgres-secret
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 60
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 30
