apiVersion: v1
kind: Job
metadata:
  name: postgres-migration
  namespace: local
spec:
  template:
    spec:
      containers:
      - name: migration
        image: test-rag-scenario-api:latest
        command:
        - alembic
        - upgrade
        - head
        env:
        - name: DATABASE_URL
          value: postgresql://postgres@postgres:5432/test-rag-scenario
      restartPolicy: OnFailure
  backoffLimit: 4
