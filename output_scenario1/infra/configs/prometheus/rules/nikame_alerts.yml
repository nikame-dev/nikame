# Auto-generated by NIKAME — DO NOT EDIT
groups:
- name: nikame-alerts
  rules:
  - alert: MinIODown
    expr: up{job='minio'} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: MinIO is down
  - alert: MinIODiskUsageHigh
    expr: minio_disk_storage_used_bytes / minio_disk_storage_total_bytes > 0.85
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: MinIO disk usage above 85%
  - alert: PostgresDown
    expr: up{job='postgres'} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: PostgreSQL is down
      description: PostgreSQL has been unreachable for over 1 minute.
  - alert: PostgresHighConnections
    expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: PostgreSQL connections above 80%
      description: Connection utilization is critically high.
  - alert: PostgresReplicationLag
    expr: pg_replication_lag > 30
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: PostgreSQL replication lag > 30s
      description: Replication lag has exceeded 30 seconds.
  - alert: APIHighLatency
    expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{service="api"}[5m]))
      > 1
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: API p95 latency above 1 second
      description: FastAPI p95 latency has been above 1s for 5 minutes.
  - alert: APIHighErrorRate
    expr: rate(http_requests_total{service="api",status=~"5.."}[5m]) / rate(http_requests_total{service="api"}[5m])
      > 0.05
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: API error rate above 5%
      description: FastAPI is returning >5% server errors.
  - alert: APIDown
    expr: up{job="api"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: FastAPI service is down
      description: FastAPI has been unreachable for over 1 minute.
