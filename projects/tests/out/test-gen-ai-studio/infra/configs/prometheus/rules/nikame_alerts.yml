# Auto-generated by NIKAME — DO NOT EDIT
groups:
- name: nikame-alerts
  rules:
  - alert: PostgresDown
    expr: up{job='postgres'} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: PostgreSQL is down
      description: PostgreSQL has been unreachable for over 1 minute.
  - alert: PostgresHighConnections
    expr: pg_stat_activity_count / pg_settings_max_connections > 0.8
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: PostgreSQL connections above 80%
      description: Connection utilization is critically high.
  - alert: PostgresReplicationLag
    expr: pg_replication_lag > 30
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: PostgreSQL replication lag > 30s
      description: Replication lag has exceeded 30 seconds.
  - alert: MinIODown
    expr: up{job='minio'} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: MinIO is down
  - alert: MinIODiskUsageHigh
    expr: minio_disk_storage_used_bytes / minio_disk_storage_total_bytes > 0.85
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: MinIO disk usage above 85%
  - alert: PrometheusTargetDown
    expr: up == 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: Prometheus target {{ $labels.job }} is down
      description: Target {{ $labels.instance }} has been unreachable for 5 minutes.
  - alert: PrometheusHighMemory
    expr: process_resident_memory_bytes{job='prometheus'} > 4e9
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: Prometheus using >4GB RAM
  - alert: MLflowDown
    expr: up{job='mlflow'} == 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: MLflow tracking server is unreachable
  - alert: GrafanaDown
    expr: up{job='grafana'} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: Grafana is down
