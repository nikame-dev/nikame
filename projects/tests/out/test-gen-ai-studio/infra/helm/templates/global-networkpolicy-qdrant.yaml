apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qdrant
  namespace: local
spec:
  podSelector:
    matchLabels:
      app: qdrant
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api
  - from:
    - podSelector:
        matchLabels:
          app: worker
