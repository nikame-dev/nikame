apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: local
  labels:
    app: qdrant
    nikame.module: qdrant
spec:
  serviceName: qdrant
  replicas: {{ .Values.qdrant.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      serviceAccountName: qdrant
      containers:
      - name: qdrant
        image: qdrant/qdrant:latest
        ports:
        - containerPort: 6333
        - containerPort: 6334
          name: grpc
        envFrom: []
        volumeMounts:
        - name: qdrant-data
          mountPath: /var/lib/qdrant
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 6333
          initialDelaySeconds: 15
  volumeClaimTemplates:
  - metadata:
      name: qdrant-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
