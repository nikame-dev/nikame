---
# StatefulSet: postgres
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: local
  labels:
    app: postgres
    nikame.module: postgres
spec:
  serviceName: postgres
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: postgres
      containers:
      - name: postgres
        image: public.ecr.aws/bitnami/postgresql:16.2.0
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

---
# StatefulSet: minio
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: local
  labels:
    app: minio
    nikame.module: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      serviceAccountName: minio
      containers:
      - name: minio
        image: minio/minio:latest
        ports:
        - containerPort: 9000
        - containerPort: 9001
          name: console
        envFrom: []
        volumeMounts:
        - name: minio-data
          mountPath: /var/lib/minio
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 20
        args:
        - server
        - /var/lib/minio
        - --console-address
        - :9001
  volumeClaimTemplates:
  - metadata:
      name: minio-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi

---
# StatefulSet: qdrant
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: local
  labels:
    app: qdrant
    nikame.module: qdrant
spec:
  serviceName: qdrant
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      serviceAccountName: qdrant
      containers:
      - name: qdrant
        image: qdrant/qdrant:latest
        ports:
        - containerPort: 6333
        - containerPort: 6334
          name: grpc
        envFrom: []
        volumeMounts:
        - name: qdrant-data
          mountPath: /var/lib/qdrant
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /healthz
            port: 6333
          initialDelaySeconds: 15
  volumeClaimTemplates:
  - metadata:
      name: qdrant-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

---
# Deployment: pgbouncer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: local
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      serviceAccountName: postgres
      containers:
      - name: pgbouncer
        image: public.ecr.aws/bitnami/pgbouncer:1.23.1
        ports:
        - containerPort: 6432
        envFrom:
        - secretRef:
            name: postgres-secret
        resources:
          requests:
            cpu: 100m
            memory: 128Mi

---
# Deployment: prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v2.49.0
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 4Gi
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        persistentVolumeClaim:
          claimName: prometheus-pvc

---
# Deployment: langfuse
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: local
  labels:
    app: langfuse
    nikame.module: langfuse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langfuse
  template:
    metadata:
      labels:
        app: langfuse
    spec:
      serviceAccountName: langfuse
      containers:
      - name: langfuse
        image: ghcr.io/langfuse/langfuse:2
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        env:
        - name: NEXTAUTH_URL
          value: http://localhost:3000
        - name: NEXTAUTH_SECRET
          value: langfuse-secret-placeholder
        - name: SALT
          value: langfuse-salt-placeholder
        - name: DATABASE_URL
          value: $(DATABASE_URL)
        - name: TELEMETRY_ENABLED
          value: 'false'
        - name: NODE_ENV
          value: production

---
# Deployment: prefect
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect
  namespace: local
  labels:
    app: prefect
    nikame.module: prefect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect
  template:
    metadata:
      labels:
        app: prefect
    spec:
      serviceAccountName: prefect
      containers:
      - name: prefect
        image: prefecthq/prefect:2-python3.11
        ports:
        - containerPort: 4200
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        env:
        - name: PREFECT_SERVER_API_HOST
          value: 0.0.0.0
        - name: PREFECT_API_URL
          value: $(PREFECT_API_URL)
        - name: PREFECT_API_DATABASE_CONNECTION_URL
          value: $(DATABASE_URL)
        command:
        - prefect
        - server
        - start
        - --host
        - 0.0.0.0

---
# Deployment: mlflow
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: local
  labels:
    app: mlflow
    nikame.module: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      serviceAccountName: mlflow
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.10.2
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        env:
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://minio:9000
        - name: MLFLOW_S3_IGNORE_TLS
          value: 'true'
        command:
        - mlflow
        - server
        - --host
        - 0.0.0.0
        - --port
        - '5000'
        - --backend-store-uri
        - $(DATABASE_URL)
        - --default-artifact-root
        - s3://mlflow

