---
# SealedSecret: project-secrets
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: project-secrets
  namespace: local
  annotations:
    sealedsecrets.bitnami.com/managed: 'true'
spec:
  encryptedData:
    S3_ACCESS_KEY: Ag...base64_placeholder...
    S3_SECRET_KEY: Ag...base64_placeholder...
    LANGFUSE_PUBLIC_KEY: Ag...base64_placeholder...
    LANGFUSE_SECRET_KEY: Ag...base64_placeholder...
  template:
    metadata:
      name: project-secrets
      labels:
        nikame.role: secrets

---
# Service: postgres
apiVersion: v1
kind: Service
metadata:
