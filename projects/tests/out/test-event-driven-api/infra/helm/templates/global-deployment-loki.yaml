apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: local
spec:
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:2.9.0
        ports:
        - containerPort: 3100
        volumeMounts:
        - name: config
          mountPath: /etc/loki/local-config.yaml
          subPath: local-config.yaml
      volumes:
      - name: config
        configMap:
          name: loki-config
