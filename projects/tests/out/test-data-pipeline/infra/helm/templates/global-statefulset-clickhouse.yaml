apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: local
spec:
  replicas: {{ .Values.global.replicaCount | default 1 }}
  serviceName: clickhouse
  selector:
    matchLabels:
      app: clickhouse
  template:
    metadata:
      labels:
        app: clickhouse
    spec:
      containers:
      - name: clickhouse
        image: clickhouse/clickhouse-server:24.1
        ports:
        - containerPort: 8123
        - containerPort: 9000
