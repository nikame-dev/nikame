apiVersion: v1
kind: Job
metadata:
  name: postgres-migration
  namespace: local
spec:
  template:
    spec:
      containers:
      - name: migration
        image: microservices-fleet-api:latest
        command:
        - alembic
        - upgrade
        - head
        env:
        - name: DATABASE_URL
          value: postgresql+asyncpg://postgres@postgres:5432/microservices-fleet
      restartPolicy: OnFailure
  backoffLimit: 4
