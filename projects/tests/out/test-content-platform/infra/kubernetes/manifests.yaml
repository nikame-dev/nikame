---
# ResourceQuota: compute-resources
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-resources
  namespace: local
spec:
  hard:
    requests.cpu: '4'
    requests.memory: 8Gi
    limits.cpu: '8'
    limits.memory: 16Gi

---
# NetworkPolicy: minio
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: minio
  namespace: local
spec:
  podSelector:
    matchLabels:
      app: minio
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api
  - from:
    - podSelector:
        matchLabels:
          app: worker

---
# NetworkPolicy: postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres
  namespace: local
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api
  - from:
    - podSelector:
        matchLabels:
          app: worker
  - from:
    - podSelector:
        matchLabels:
          app: pgbouncer

---
# NetworkPolicy: api
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api
  namespace: local
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: ingress-nginx
  - from:
    - podSelector:
        matchLabels:
          app: traefik

---
# ServiceAccount: minio
apiVersion: v1
kind: ServiceAccount
metadata:
  name: minio
  namespace: local
  labels:
    app: minio

---
# ServiceAccount: postgres
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: local
  labels:
    app: postgres

---
# ServiceAccount: api
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api
  namespace: local
  labels:
    app: api

---
# SealedSecret: project-secrets
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: project-secrets
  namespace: local
  annotations:
    sealedsecrets.bitnami.com/managed: 'true'
spec:
  encryptedData:
    S3_ACCESS_KEY: Ag...base64_placeholder...
    S3_SECRET_KEY: Ag...base64_placeholder...
  template:
    metadata:
      name: project-secrets
      labels:
        nikame.role: secrets

---
# ConfigMap: api-config
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: local
data:
  APP_ENV: local
  PORT: '8000'

---
# Service: prometheus
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: local
spec:
  selector:
    app: prometheus
  ports:
  - port: 9090
    targetPort: 9090

---
# Service: grafana
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: local
spec:
  selector:
    app: grafana
  ports:
  - port: 3000
    targetPort: 3000

---
# Service: minio
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: local
  labels:
    app: minio
spec:
  selector:
    app: minio
  ports:
  - port: 9000
    targetPort: 9000
    name: api
  - port: 9001
    targetPort: 9001
    name: console

---
# Service: dragonfly
apiVersion: v1
kind: Service
metadata:
  name: dragonfly
  namespace: local
spec:
  selector:
    app: dragonfly
  ports:
  - port: 6379
    targetPort: 6379

---
# Service: redpanda
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: local
spec:
  selector:
    app: redpanda
  ports:
  - port: 9092
    targetPort: 9092
    name: kafka
  - port: 8081
    targetPort: 8081
    name: schema-registry
  clusterIP: None

---
# Service: postgres
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: local
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None

---
# Service: pgbouncer
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: local
spec:
  selector:
    app: pgbouncer
  ports:
  - port: 5432
    targetPort: 6432

---
# Service: api
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: local
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP

---
# StatefulSet: minio
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: local
  labels:
    app: minio
    nikame.module: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      serviceAccountName: minio
      containers:
      - name: minio
        image: minio/minio:latest
        ports:
        - containerPort: 9000
        - containerPort: 9001
          name: console
        envFrom: []
        volumeMounts:
        - name: minio-data
          mountPath: /var/lib/minio
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 20
        args:
        - server
        - /var/lib/minio
        - --console-address
        - :9001
  volumeClaimTemplates:
  - metadata:
      name: minio-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi

---
# StatefulSet: dragonfly
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dragonfly
  namespace: local
  labels:
    app: dragonfly
    nikame.module: dragonfly
spec:
  serviceName: dragonfly
  replicas: 1
  selector:
    matchLabels:
      app: dragonfly
  template:
    metadata:
      labels:
        app: dragonfly
    spec:
      serviceAccountName: dragonfly
      containers:
      - name: dragonfly
        image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
        ports:
        - containerPort: 6379
        envFrom: []
        volumeMounts:
        - name: dragonfly-data
          mountPath: /var/lib/dragonfly
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 30
        args:
        - --maxmemory=1gb
        - --cache_mode=true
  volumeClaimTemplates:
  - metadata:
      name: dragonfly-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

---
# StatefulSet: redpanda
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: local
spec:
  serviceName: redpanda
  replicas: 3
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
      - name: redpanda
        image: redpandadata/redpanda:latest
        ports:
        - containerPort: 9092
          name: kafka
        - containerPort: 8081
          name: schema-registry
        - containerPort: 9644
          name: admin
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi

---
# StatefulSet: elasticsearch
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: local
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
        ports:
        - containerPort: 9200
        env:
        - name: discovery.type
          value: single-node
        - name: xpack.security.enabled
          value: 'false'

---
# StatefulSet: postgres
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: local
  labels:
    app: postgres
    nikame.module: postgres
spec:
  serviceName: postgres
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: postgres
      containers:
      - name: postgres
        image: public.ecr.aws/bitnami/postgresql:16.2.0
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

---
# Deployment: prometheus
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
      - name: prometheus
        image: prom/prometheus:v2.49.0
        ports:
        - containerPort: 9090
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
        - name: data
          mountPath: /prometheus
        resources:
          requests:
            cpu: 250m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 4Gi
      volumes:
      - name: config
        configMap:
          name: prometheus-config
      - name: data
        persistentVolumeClaim:
          claimName: prometheus-pvc

---
# Deployment: otel-collector
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: local
spec:
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      containers:
      - name: otel-collector
        image: otel/opentelemetry-collector-contrib:0.96.0
        ports:
        - containerPort: 4317
        volumeMounts:
        - name: config
          mountPath: /etc/otel-collector-config.yaml
          subPath: otel-collector-config.yaml
      volumes:
      - name: config
        configMap:
          name: otel-collector-config

---
# Deployment: tempo
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
  namespace: local
spec:
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
      - name: tempo
        image: grafana/tempo:2.3.0
        ports:
        - containerPort: 3200
        volumeMounts:
        - name: config
          mountPath: /etc/tempo.yaml
          subPath: tempo.yaml
      volumes:
      - name: config
        configMap:
          name: tempo-config

---
# Deployment: loki
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: local
spec:
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:2.9.0
        ports:
        - containerPort: 3100
        volumeMounts:
        - name: config
          mountPath: /etc/loki/local-config.yaml
          subPath: local-config.yaml
      volumes:
      - name: config
        configMap:
          name: loki-config

---
# Deployment: grafana
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.0
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: grafana-secret
        volumeMounts:
        - name: data
          mountPath: /var/lib/grafana
        - name: dashboards
          mountPath: /var/lib/grafana/dashboards
        - name: provisioning
          mountPath: /etc/grafana/provisioning
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: grafana-pvc
      - name: dashboards
        configMap:
          name: grafana-dashboards
      - name: provisioning
        configMap:
          name: grafana-provisioning

---
# Deployment: pgbouncer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: local
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      serviceAccountName: postgres
      containers:
      - name: pgbouncer
        image: public.ecr.aws/bitnami/pgbouncer:1.23.1
        ports:
        - containerPort: 6432
        envFrom:
        - secretRef:
            name: postgres-secret
        resources:
          requests:
            cpu: 100m
            memory: 128Mi

---
# Deployment: api
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: local
  labels:
    app: api
    nikame.module: fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: api
      initContainers:
      - name: wait-for-postgres
        image: busybox:latest
        command:
        - sh
        - -c
        - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;
      containers:
      - name: api
        image: content-platform-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: api
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10

---
# Job: postgres-migration
apiVersion: v1
kind: Job
metadata:
  name: postgres-migration
  namespace: local
spec:
  template:
    spec:
      containers:
      - name: migration
        image: content-platform-api:latest
        command:
        - alembic
        - upgrade
        - head
        env:
        - name: DATABASE_URL
          value: postgresql+asyncpg://postgres@postgres:5432/content-platform
      restartPolicy: OnFailure
  backoffLimit: 4

