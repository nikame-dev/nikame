# PodDisruptionBudget: dragonfly
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dragonfly
  namespace: local
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: dragonfly

---
# PodDisruptionBudget: postgres
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres
  namespace: local
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres

---
# PodDisruptionBudget: api
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api
  namespace: local
spec:
  minAvailable: 1
  selector:
    matchLabels:
