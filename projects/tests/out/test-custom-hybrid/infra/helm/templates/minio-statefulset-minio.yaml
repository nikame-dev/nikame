apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: production
  labels:
    app: minio
    nikame.module: minio
spec:
  serviceName: minio
  replicas: {{ .Values.minio.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      serviceAccountName: minio
      containers:
      - name: minio
        image: minio/minio:latest
        ports:
        - containerPort: 9000
        - containerPort: 9001
          name: console
        envFrom: []
        volumeMounts:
        - name: minio-data
          mountPath: /var/lib/minio
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 20
        args:
        - server
        - /var/lib/minio
        - --console-address
        - :9001
  volumeClaimTemplates:
  - metadata:
      name: minio-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi
