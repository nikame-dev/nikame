apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: production
  labels:
    app: mlflow
    nikame.module: mlflow
spec:
  replicas: {{ .Values.mlflow.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      serviceAccountName: mlflow
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.10.2
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        env:
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://minio:9000
        - name: MLFLOW_S3_IGNORE_TLS
          value: 'true'
        command:
        - mlflow
        - server
        - --host
        - 0.0.0.0
        - --port
        - '5000'
        - --backend-store-uri
        - $(DATABASE_URL)
        - --default-artifact-root
        - s3://mlflow
