---
# Deployment: api
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: production
  labels:
    app: api
    nikame.module: fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: api
      initContainers:
      - name: wait-for-postgres
        image: busybox:latest
        command:
        - sh
        - -c
        - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;
      containers:
      - name: api
        image: custom-hybrid-db-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: api
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10

---
# Job: postgres-migration
apiVersion: v1
kind: Job
metadata:
  name: postgres-migration
  namespace: production
spec:
  template:
    spec:
      containers:
      - name: migration
        image: custom-hybrid-db-api:latest
        command:
        - alembic
        - upgrade
        - head
        env:
        - name: DATABASE_URL
          value: postgresql+asyncpg://postgres@postgres:5432/custom-hybrid-db
      restartPolicy: OnFailure
  backoffLimit: 4

---
# CronJob: postgres-backup
apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: production
spec:
  schedule: 0 2 * * *
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: public.ecr.aws/bitnami/postgresql:16.2.0
            command:
            - /bin/bash
            - -c
            - pg_dump -h postgres -U postgres custom-hybrid-db > /backups/backup_$(date
              +%Y%m%d).sql
            envFrom:
            - secretRef:
                name: postgres-secret
            volumeMounts:
            - name: backups
              mountPath: /backups
          restartPolicy: OnFailure
          volumes:
          - name: backups
            persistentVolumeClaim:
              claimName: postgres-backup-pvc

---
# PodDisruptionBudget: postgres
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres

---
# PodDisruptionBudget: minio
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: minio
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: minio

---
# PodDisruptionBudget: api
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api

---
# HorizontalPodAutoscaler: api
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
