---
# StatefulSet: postgres
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: production
  labels:
    app: postgres
    nikame.module: postgres
spec:
  serviceName: postgres
  replicas: 3
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: postgres
      containers:
      - name: postgres
        image: public.ecr.aws/bitnami/postgresql:16.2.0
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

---
# StatefulSet: minio
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: production
  labels:
    app: minio
    nikame.module: minio
spec:
  serviceName: minio
  replicas: 1
  selector:
    matchLabels:
      app: minio
  template:
    metadata:
      labels:
        app: minio
    spec:
      serviceAccountName: minio
      containers:
      - name: minio
        image: minio/minio:latest
        ports:
        - containerPort: 9000
        - containerPort: 9001
          name: console
        envFrom: []
        volumeMounts:
        - name: minio-data
          mountPath: /var/lib/minio
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: 9000
          initialDelaySeconds: 20
        args:
        - server
        - /var/lib/minio
        - --console-address
        - :9001
  volumeClaimTemplates:
  - metadata:
      name: minio-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 20Gi

---
# StatefulSet: elasticsearch
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: production
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
        ports:
        - containerPort: 9200
        env:
        - name: discovery.type
          value: single-node
        - name: xpack.security.enabled
          value: 'false'

---
# StatefulSet: mongodb
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: production
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7.0
        ports:
        - containerPort: 27017
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          value: admin
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-secrets
              key: password

---
# Deployment: pgbouncer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: production
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      serviceAccountName: postgres
      containers:
      - name: pgbouncer
        image: public.ecr.aws/bitnami/pgbouncer:1.23.1
        ports:
        - containerPort: 6432
        envFrom:
        - secretRef:
            name: postgres-secret
        resources:
          requests:
            cpu: 100m
            memory: 128Mi

---
# Deployment: evidently
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evidently
  namespace: production
  labels:
    app: evidently
    nikame.module: evidently
spec:
  replicas: 1
  selector:
    matchLabels:
      app: evidently
  template:
    metadata:
      labels:
        app: evidently
    spec:
      serviceAccountName: evidently
      containers:
      - name: evidently
        image: python:3.11-slim
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        command:
        - bash
        - -c
        - pip install evidently && evidently ui --port 8000 --host 0.0.0.0 --workspace
          /app/workspace
        volumeMounts:
        - name: data
          mountPath: /app/workspace
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: evidently-data

---
# Deployment: prefect
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect
  namespace: production
  labels:
    app: prefect
    nikame.module: prefect
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect
  template:
    metadata:
      labels:
        app: prefect
    spec:
      serviceAccountName: prefect
      containers:
      - name: prefect
        image: prefecthq/prefect:2-python3.11
        ports:
        - containerPort: 4200
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        env:
        - name: PREFECT_SERVER_API_HOST
          value: 0.0.0.0
        - name: PREFECT_API_URL
          value: $(PREFECT_API_URL)
        - name: PREFECT_API_DATABASE_CONNECTION_URL
          value: $(DATABASE_URL)
        command:
        - prefect
        - server
        - start
        - --host
        - 0.0.0.0

---
# Deployment: mlflow
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: production
  labels:
    app: mlflow
    nikame.module: mlflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      serviceAccountName: mlflow
      containers:
      - name: mlflow
        image: ghcr.io/mlflow/mlflow:v2.10.2
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        env:
        - name: MLFLOW_S3_ENDPOINT_URL
          value: http://minio:9000
        - name: MLFLOW_S3_IGNORE_TLS
          value: 'true'
        command:
        - mlflow
        - server
        - --host
        - 0.0.0.0
        - --port
        - '5000'
        - --backend-store-uri
        - $(DATABASE_URL)
        - --default-artifact-root
        - s3://mlflow

