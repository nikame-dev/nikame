---
# SealedSecret: project-secrets
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: project-secrets
  namespace: production
  annotations:
    sealedsecrets.bitnami.com/managed: 'true'
spec:
  encryptedData:
    S3_ACCESS_KEY: Ag...base64_placeholder...
    S3_SECRET_KEY: Ag...base64_placeholder...
  template:
    metadata:
      name: project-secrets
      labels:
        nikame.role: secrets

---
# ConfigMap: api-config
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: production
data:
  APP_ENV: aws
  PORT: '8000'

---
# PersistentVolumeClaim: postgres-backup-pvc
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: production
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi

---
# PersistentVolumeClaim: evidently-data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: evidently-data
  namespace: production
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
# Service: postgres
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: production
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None

---
# Service: pgbouncer
apiVersion: v1
