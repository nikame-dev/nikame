apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dragonfly
  namespace: local
  labels:
    app: dragonfly
    nikame.module: dragonfly
spec:
  serviceName: dragonfly
  replicas: {{ .Values.dragonfly.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: dragonfly
  template:
    metadata:
      labels:
        app: dragonfly
    spec:
      serviceAccountName: dragonfly
      containers:
      - name: dragonfly
        image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
        ports:
        - containerPort: 6379
        envFrom: []
        volumeMounts:
        - name: dragonfly-data
          mountPath: /var/lib/dragonfly
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 30
        args:
        - --maxmemory=1gb
        - --cache_mode=true
  volumeClaimTemplates:
  - metadata:
      name: dragonfly-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
