---
# ResourceQuota: compute-resources
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-resources
  namespace: local
spec:
  hard:
    requests.cpu: '4'
    requests.memory: 8Gi
    limits.cpu: '8'
    limits.memory: 16Gi

---
# NetworkPolicy: postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres
  namespace: local
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api
  - from:
    - podSelector:
        matchLabels:
          app: worker
  - from:
    - podSelector:
        matchLabels:
          app: pgbouncer

---
# NetworkPolicy: api
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api
  namespace: local
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: ingress-nginx
  - from:
    - podSelector:
        matchLabels:
          app: traefik

---
# ServiceAccount: postgres
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: local
  labels:
    app: postgres

---
# ServiceAccount: api
apiVersion: v1
kind: ServiceAccount
metadata:
  name: api
  namespace: local
  labels:
    app: api

---
# ConfigMap: api-config
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: local
data:
  APP_ENV: local
  PORT: '8000'

---
# Service: dragonfly
apiVersion: v1
kind: Service
metadata:
  name: dragonfly
  namespace: local
spec:
  selector:
    app: dragonfly
  ports:
  - port: 6379
    targetPort: 6379

---
# Service: redpanda
apiVersion: v1
kind: Service
metadata:
  name: redpanda
  namespace: local
spec:
  selector:
    app: redpanda
  ports:
  - port: 9092
    targetPort: 9092
    name: kafka
  - port: 8081
    targetPort: 8081
    name: schema-registry
  clusterIP: None

---
# Service: postgres
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: local
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None

---
# Service: pgbouncer
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: local
spec:
  selector:
    app: pgbouncer
  ports:
  - port: 5432
    targetPort: 6432

---
# Service: api
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: local
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP

---
# StatefulSet: dragonfly
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: dragonfly
  namespace: local
  labels:
    app: dragonfly
    nikame.module: dragonfly
spec:
  serviceName: dragonfly
  replicas: 1
  selector:
    matchLabels:
      app: dragonfly
  template:
    metadata:
      labels:
        app: dragonfly
    spec:
      serviceAccountName: dragonfly
      containers:
      - name: dragonfly
        image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
        ports:
        - containerPort: 6379
        envFrom: []
        volumeMounts:
        - name: dragonfly-data
          mountPath: /var/lib/dragonfly
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 30
        args:
        - --maxmemory=1gb
        - --cache_mode=true
  volumeClaimTemplates:
  - metadata:
      name: dragonfly-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

---
# StatefulSet: redpanda
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redpanda
  namespace: local
spec:
  serviceName: redpanda
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
      - name: redpanda
        image: redpandadata/redpanda:latest
        ports:
        - containerPort: 9092
          name: kafka
        - containerPort: 8081
          name: schema-registry
        - containerPort: 9644
          name: admin
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 2Gi

---
# StatefulSet: elasticsearch
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: local
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
        ports:
        - containerPort: 9200
        env:
        - name: discovery.type
          value: single-node
        - name: xpack.security.enabled
          value: 'false'

---
# StatefulSet: postgres
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: local
  labels:
    app: postgres
    nikame.module: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: postgres
      containers:
      - name: postgres
        image: postgres:16-alpine
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

---
# Deployment: pgbouncer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: local
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      serviceAccountName: postgres
      containers:
      - name: pgbouncer
        image: public.ecr.aws/bitnami/pgbouncer:1.23.1
        ports:
        - containerPort: 6432
        envFrom:
        - secretRef:
            name: postgres-secret
        resources:
          requests:
            cpu: 100m
            memory: 128Mi

---
# Deployment: api
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: local
  labels:
    app: api
    nikame.module: fastapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: api
      initContainers:
      - name: wait-for-postgres
        image: busybox:latest
        command:
        - sh
        - -c
        - until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done;
      containers:
      - name: api
        image: test-event-scenario-api:latest
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: api
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10

---
# Job: postgres-migration
apiVersion: v1
kind: Job
metadata:
  name: postgres-migration
  namespace: local
spec:
  template:
    spec:
      containers:
      - name: migration
        image: test-event-scenario-api:latest
        command:
        - alembic
        - upgrade
        - head
        env:
        - name: DATABASE_URL
          value: postgresql://postgres@postgres:5432/test-event-scenario
      restartPolicy: OnFailure
  backoffLimit: 4

---
# PodDisruptionBudget: dragonfly
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: dragonfly
  namespace: local
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: dragonfly

---
# PodDisruptionBudget: postgres
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres
  namespace: local
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres

---
# PodDisruptionBudget: api
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api
  namespace: local
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api

---
# HorizontalPodAutoscaler: dragonfly
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dragonfly
  namespace: local
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dragonfly
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
# HorizontalPodAutoscaler: api
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: local
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
