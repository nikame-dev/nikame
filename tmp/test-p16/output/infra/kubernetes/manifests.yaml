---
# ResourceQuota: compute-resources
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-resources
  namespace: production
spec:
  hard:
    requests.cpu: '4'
    requests.memory: 8Gi
    limits.cpu: '8'
    limits.memory: 16Gi

---
# NetworkPolicy: postgres
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: api
  - from:
    - podSelector:
        matchLabels:
          app: worker
  - from:
    - podSelector:
        matchLabels:
          app: pgbouncer

---
# ServiceAccount: postgres
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres
  namespace: production
  labels:
    app: postgres

---
# Service: postgres
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: production
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432
  clusterIP: None

---
# Service: pgbouncer
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: production
spec:
  selector:
    app: pgbouncer
  ports:
  - port: 5432
    targetPort: 6432

---
# StatefulSet: postgres
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: production
  labels:
    app: postgres
    nikame.module: postgres
spec:
  serviceName: postgres
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      serviceAccountName: postgres
      containers:
      - name: postgres
        image: public.ecr.aws/bitnami/postgresql:16.2.0
        ports:
        - containerPort: 5432
        envFrom:
        - secretRef:
            name: postgres-secret
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 30
          periodSeconds: 10
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

---
# Deployment: pgbouncer
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: production
  labels:
    app: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer
  template:
    metadata:
      labels:
        app: pgbouncer
    spec:
      serviceAccountName: postgres
      containers:
      - name: pgbouncer
        image: public.ecr.aws/bitnami/pgbouncer:1.23.1
        ports:
        - containerPort: 6432
        envFrom:
        - secretRef:
            name: postgres-secret
        resources:
          requests:
            cpu: 100m
            memory: 128Mi

---
# Job: postgres-migration
apiVersion: v1
kind: Job
metadata:
  name: postgres-migration
  namespace: production
spec:
  template:
    spec:
      containers:
      - name: migration
        image: test-project-api:latest
        command:
        - alembic
        - upgrade
        - head
        env:
        - name: DATABASE_URL
          value: postgresql+asyncpg://postgres@postgres:5432/test-project
      restartPolicy: OnFailure
  backoffLimit: 4

---
# PodDisruptionBudget: postgres
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres
  namespace: production
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: postgres
