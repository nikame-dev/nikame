name = "Celery + Redis Task Queue"
slug = "tasks/celery-redis-docker"
category = "tasks"
tags = ["tasks", "celery", "redis", "docker", "background"]
description = "Production-grade Celery implementation with Redis broker and Docker support"
difficulty = "advanced"
deps = ["celery", "redis"]
depends_on = ["core/settings"]

[[files]]
src = "worker.py"
dest = "worker/celery_app.py"
merge = "replace"

[[files]]
src = "tasks.py"
dest = "worker/tasks.py"
merge = "replace"

[[files]]
src = "docker-compose.yml"
dest = "docker-compose.tasks.yml"
merge = "replace"

template_vars = ["REDIS_URL"]
related = ["ai_infra/async-job-webhook", "core/lifespan"]
