name = "Google OAuth2 Social Login"
slug = "auth/social-oauth2-google"
category = "auth"
tags = ["auth", "google", "oauth2", "social", "httpx"]
description = "Clean implementation of Google login using httpx and FastAPI"
difficulty = "advanced"
deps = ["httpx", "python-jose[cryptography]"]
depends_on = ["auth/jwt"]

[[files]]
src = "google_auth.py"
dest = "auth/social/google.py"
merge = "replace"

[[files]]
src = "router.py"
dest = "routers/social_auth.py"
merge = "replace"

template_vars = ["GOOGLE_CLIENT_ID", "GOOGLE_CLIENT_SECRET", "GOOGLE_REDIRECT_URI"]
related = ["auth/jwt", "auth/rbac"]
