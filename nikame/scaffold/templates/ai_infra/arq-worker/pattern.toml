[[files]]
src = "worker.py"
dest = "ai_infra/worker.py"
merge = "replace"

[[files]]
src = "service.py"
dest = "ai_infra/worker_service.py"
merge = "replace"

template_vars = ["REDIS_URL"]
related = ["ai_infra/async-job-webhook"]
