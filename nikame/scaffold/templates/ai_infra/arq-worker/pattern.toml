name = "ARQ Worker"
slug = "ai_infra/arq-worker"
category = "ai_infra"
tags = ["ai", "async", "jobs", "redis", "arq"]
description = "ARQ (async Redis Queue) worker setup: job definition, enqueueing, worker entrypoint"
difficulty = "advanced"
deps = ["arq", "redis"]
