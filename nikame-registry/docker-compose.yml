version: "3.8"

services:
  registry-api:
    build: .
    ports:
      - "8005:8000"
    environment:
      - DATABASE_URL=postgresql://nikame:nikame@postgres:5432/registry
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=nikame
      - POSTGRES_PASSWORD=nikame
      - POSTGRES_DB=registry
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nikame -d registry"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
