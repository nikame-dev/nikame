version: '1.0'
name: content-platform
description: Content management with full-text search and media storage.
project:
  type: content_platform
  scale: medium
environment:
  target: local
  profile: local
api:
  framework: fastapi
databases:
  postgres: {}
  elasticsearch: {}
storage:
  provider: minio
cache:
  provider: dragonfly
messaging:
  redpanda: {}
routing:
  proxy: traefik
features:
- auth
- health_check
observability:
  logging: loki
  metrics: prometheus
  traces: tempo
